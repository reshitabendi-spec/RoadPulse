
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadPulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Brand Section -->
    <div class="brand-section">
        <h1>🚦 RoadPulse</h1>
        <p>Report. Alert. Prevent.</p>
    </div>

    <!-- Login / Signup Card -->
    <div class="card-container">

        <input type="checkbox" id="flip">

        <div class="card">

            <!-- Login Side -->
            <div class="front">

                <h2>Welcome Back</h2>

                <form>

                    <input
    id="loginEmail"
    type="email"
    placeholder="Email Address"
    required>

                   <input
    id="loginPassword"
    type="password"
    placeholder="Password"
    required>

                   <button
    type="button"
    id="loginBtn">
    Login
</button>

                    <p class="quote">
                        Together for Safer Roads 🚦
                    </p>

                </form>

                <label for="flip">
                    Don't have an account? Sign Up
                </label>

            </div>

            <!-- Signup Side -->
            <div class="back">

                <h2>Create Account</h2>

                <form>

                   <input
    id="signupName"
    type="text"
    placeholder="Full Name"
    required>

                    <input
    id="signupEmail"
    type="email"
    placeholder="Email Address"
    required>

                    <input
    id="signupPassword"
    type="password"
    placeholder="Password"
    required>

                   <button
    type="button"
    id="signupBtn">
    Sign Up
</button>

                    <p class="quote">
                        Together for Safer Roads 🚦
                    </p>

                </form>

                <label for="flip">
                    Already have an account? Login
                </label>

            </div>

        </div>

    </div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
