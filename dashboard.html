
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadPulse Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="top-bar">

    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

</div>

<div class="header-content">

    <h1>🚦 RoadPulse</h1>

    <p>Report. Alert. Prevent.</p>

</div>

<div class="dashboard">

    <div class="card report"
     onclick="window.location.href='report.html'">

        <i class="fa-solid fa-triangle-exclamation"></i>

        <h2>Report an Issue</h2>

        <p>Upload unsafe road conditions</p>

    </div>

    <div class="card awareness"
     onclick="window.location.href='awareness.html'">

        <i class="fa-solid fa-helmet-safety"></i>

        <h2>Awareness</h2>

        <p>Traffic rules & safety tips</p>

    </div>

    <div class="card reports"
     onclick="window.location.href='reports.html'">

        <i class="fa-solid fa-chart-column"></i>

        <h2>Total Reports</h2>

        <p>View all reported issues</p>

    </div>

</div>

<script type="module" src="alerts.js"></script>

</body>
</html>
